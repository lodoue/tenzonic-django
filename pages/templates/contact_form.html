{% extends 'base.html' %}

{% load django_bootstrap5 %}

{% block content %}

    {% include "alert.html" %}

    <form action="" method="post" class="form">
        {% csrf_token %}

        {% bootstrap_form form %}

        {% bootstrap_button button_type="submit" content="Submit" %}
        {% bootstrap_button button_type="reset" content="Reset" %}
    </form>
{% endblock %}
