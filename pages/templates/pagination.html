<nav aria-label="Page navigation example">
    <ul class="pagination justify-content-end">
        {% if list_obj.has_previous %}
            <li class="page-item">
                <a class="page-link" href="{% url 'pages:listContactus' list_obj.previous_page_number list_obj.paginator.per_page %}" tabindex="-1">Previous</a>
        {% else %}
            <li class="page-item disabled"><a class="page-link" href="#" tabindex="-1">Previous</a>
        {% endif %}
        </li>

        {% for page in list_obj.paginator.page_range %}
            {% if page is list_obj.number %}
                <li class="page-item active">
            {% else %}
                <li class="page-item">
            {% endif %}
                <a class="page-link" href="{% url 'pages:listContactus' page list_obj.paginator.per_page %}">{{ page }}</a>
            </li>
        {% endfor %}

        {% if list_obj.has_next %}
            <li class="page-item">
                <a class="page-link" href="{% url 'pages:listContactus' list_obj.next_page_number list_obj.paginator.per_page %}" tabindex="-1">Next</a>
        {% else %}
            <li class="page-item disabled"><a class="page-link" href="#" tabindex="-1">Next</a>
        {% endif %}
        </li>
    </ul>
</nav>
